name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install app dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build konfigurator static export
        working-directory: app
        env:
          CAPTCHA_PROVIDER: none
          NEXT_PUBLIC_API_BASE: /wp-json/kw-pv-tools/v1
        run: pnpm build

      - name: Sync konfigurator bundle into plugin
        run: |
          mkdir -p wordpress-plugin/kw-pv-tools/assets/konfigurator
          cp -r app/out/. wordpress-plugin/kw-pv-tools/assets/konfigurator/
          if [ -f app/kw-pv-tools-manifest.json ]; then
            cp app/kw-pv-tools-manifest.json wordpress-plugin/kw-pv-tools/assets/konfigurator/
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Composer dependencies
        working-directory: wordpress-plugin/kw-pv-tools
        run: composer install --no-dev --optimize-autoloader

      - name: Read plugin version
        id: plugin_version
        run: |
          VERSION=$(grep 'Version:' wordpress-plugin/kw-pv-tools/kw-pv-tools.php | head -1 | awk '{print $NF}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create plugin ZIP
        run: |
          mkdir -p wordpress-plugin/builds
          cd wordpress-plugin
          zip -r "builds/kw-pv-tools-v${{ steps.plugin_version.outputs.version }}.zip" "kw-pv-tools" \
            -x "*/node_modules/*" \
            -x "*/.git/*" \
            -x "*/.DS_Store" \
            -x "*/builds/*" \
            -x "*/.gitkeep"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wordpress-plugin/builds/kw-pv-tools-v${{ steps.plugin_version.outputs.version }}.zip
          generate_release_notes: true
          name: KW PV Tools v${{ steps.plugin_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
