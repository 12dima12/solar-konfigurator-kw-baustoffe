name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Validate manufacturers
        run: node scripts/validate-manufacturers.mjs

      - name: Run unit tests
        run: pnpm vitest run

      - name: Build (static export)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: "/wp-json/kw-pv-tools/v1"
          NEXT_PUBLIC_ASSET_PREFIX: "/wp-content/plugins/kw-pv-tools/assets/konfigurator"

      - name: Check export output
        run: |
          test -d out/solax/configurator || (echo "Missing solax/configurator" && exit 1)
          test -d out/solax/embed        || (echo "Missing solax/embed" && exit 1)
          test -f out/kw-pv-tools-manifest.json || (echo "Missing manifest" && exit 1)
          echo "Export output OK"
        working-directory: ./app

  # PHP 7.4 compatibility gate for the WordPress plugin.
  # The plugin declares `Requires PHP: 7.4` — this job enforces it so that
  # accidental usage of PHP 8+ functions (e.g. str_contains, match, readonly)
  # fails CI instead of surfacing as a fatal error on a customer's shared host.
  php-compat:
    name: PHP 7.4 compatibility (wordpress-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none
          tools: composer:v2

      - name: Syntax lint against PHP 7.4
        run: |
          find wordpress-plugin -name "*.php" -not -path "*/vendor/*" -print0 \
            | xargs -0 -n1 -P4 php -l
          echo "PHP 7.4 syntax lint passed."

      - name: Install PHPCompatibility
        run: |
          composer global config --no-interaction --no-plugins \
            allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer \
            phpcompatibility/php-compatibility \
            dealerdirect/phpcodesniffer-composer-installer
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Scan plugin for PHP 8+ function / syntax usage
        run: |
          phpcs -p \
            --standard=PHPCompatibility \
            --runtime-set testVersion 7.4- \
            --extensions=php \
            --ignore="*/vendor/*" \
            wordpress-plugin/kw-pv-tools

  # Build a fully installable kw-pv-tools-v<VERSION>.zip exactly as package.sh
  # would produce locally, and upload it as a GitHub Actions artifact so
  # reviewers / Dima can pull a working plugin from any PR or main commit
  # without running the build locally.
  #
  # Needs both test + php-compat to pass first: no point packaging a build
  # that fails its own compatibility gate.
  plugin-build:
    name: Build plugin ZIP
    needs: [test, php-compat]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup PHP 7.4 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          # mpdf requires gd + mbstring + zlib + xml. shivammathur's runner
          # ships a minimal PHP, so we have to ask for them explicitly —
          # otherwise `composer install` inside package.sh aborts with
          # "ext-gd * -> it is missing from your system".
          extensions: mbstring, gd, zlib, xml, bcmath, iconv
          coverage: none
          tools: composer:v2

      - name: Install Node dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Sync Next.js export into plugin
        run: ./wordpress-plugin/build/sync-konfigurator.sh

      - name: Package plugin ZIP
        run: ./wordpress-plugin/build/package.sh

      - name: Resolve ZIP path
        id: zip
        run: |
          ZIP=$(ls wordpress-plugin/builds/kw-pv-tools-v*.zip | head -1)
          echo "path=$ZIP"       >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"
          ls -lh wordpress-plugin/builds/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  # Attach the plugin ZIP to a GitHub Release whenever a v* tag is pushed.
  # Creates the release if it doesn't yet exist; updates it (overwrites the
  # asset) if the tag was re-pushed. The plugin-update-checker consumes
  # these releases to surface "Aktualisierung verfügbar" in WP-Admin.
  release:
    name: GitHub Release
    needs: [plugin-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download plugin ZIP
        uses: actions/download-artifact@v4
        with:
          pattern: kw-pv-tools-v*.zip
          merge-multiple: true
          path: ./release-asset

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-asset/kw-pv-tools-v*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
