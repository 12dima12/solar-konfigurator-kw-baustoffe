<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KW Configurator Host Test</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    h1 { color: #1e3a5f; font-size: 1.2rem; margin-bottom: 8px; }
    p { font-size: 0.85rem; color: #555; margin-bottom: 16px; }
    #kw-config { width: 100%; border: 2px dashed #1e3a5f; border-radius: 8px; display: block; background: white; }
    #debug { margin-top: 16px; font-size: 0.75rem; font-family: monospace; background: #1e3a5f; color: #90ee90; padding: 12px; border-radius: 6px; min-height: 60px; }
  </style>
</head>
<body>
  <h1>Host Page – simuliert kw-baustoffe.de</h1>
  <p>Dieser Test prüft die iFrame-Integration. Der Konfigurator läuft auf localhost:3000/embed.</p>

  <iframe
    id="kw-config"
    src="http://localhost:3000/embed"
    style="min-height: 600px;"
    title="KW PV Konfigurator"
  ></iframe>

  <div id="debug">postMessage Log:<br/></div>

  <script>
    const iframe = document.getElementById("kw-config");
    const debugEl = document.getElementById("debug");

    window.addEventListener("message", (e) => {
      const msg = `[${new Date().toLocaleTimeString()}] origin=${e.origin} data=${JSON.stringify(e.data)}`;
      debugEl.innerHTML += msg + "<br/>";

      // Nur eigene Messages verarbeiten
      if (e.data?.type === "kw-configurator-resize") {
        iframe.style.height = e.data.height + "px";
        debugEl.innerHTML += `  → iframe.height = ${e.data.height}px<br/>`;
      }
    });

    // Manuelle Höhen-Abfrage
    setTimeout(() => {
      iframe.contentWindow?.postMessage("getHeight", "*");
    }, 1000);
  </script>
</body>
</html>
