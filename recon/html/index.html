<!-- JAVASCRIPT -->

<script>

function toggleDropdown() {
    const dropdown = document.getElementById('langDropdown');
    
    if (!dropdown) {
        console.error('Language dropdown element not found');
        return;
    }
    
    dropdown.classList.toggle('hidden');
    
    // Použití weak reference pro lepší garbage collection
    const closeHandler = function(e) {
        if (!dropdown.contains(e.target) && !e.target.closest('button[onclick="toggleDropdown()"]')) {
            dropdown.classList.add('hidden');
            document.removeEventListener('click', closeHandler);
        }
    };
    
    // Přidání event listeneru s mírným zpožděním
    setTimeout(() => {
        document.addEventListener('click', closeHandler);
    }, 10);
}

// Accessibility enhancement - keyboard support
document.addEventListener('DOMContentLoaded', function() {
    const dropdownButton = document.querySelector('button[onclick="toggleDropdown()"]');
    
    if (dropdownButton) {
        dropdownButton.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleDropdown();
            }
        });
    }
});
</script>
<script>
    let lastHeight = 0;
    let isInitialized = false;
    
    function sendHeight() {
        const height = document.body.scrollHeight;
        
        // Pošli výšku pouze pokud se změnila nebo je to první volání
        if (height !== lastHeight || !isInitialized) {
            lastHeight = height;
            isInitialized = true;
            console.log('Sending height to parent:', height);
            window.parent.postMessage({ height: height }, "*");
        }
    }
    
    // Pošli výšku po načtení
    window.addEventListener('load', sendHeight);
    
    // Debounce funkce pro resize
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(sendHeight, 250);
    });
    
    // Debounce funkce pro mutation observer
    let mutationTimeout;
    const observer = new MutationObserver(function() {
        clearTimeout(mutationTimeout);
        mutationTimeout = setTimeout(sendHeight, 100);
    });
    observer.observe(document.body, { 
        childList: true, 
        subtree: true, 
        attributes: true 
    });
    
    // Poslouchej zprávy od parent okna
    window.addEventListener('message', function(event) {
        if (event.data === 'getHeight') {
            sendHeight();
        }
    });
</script>
