name: CI

on:
  push:
    branches: [main, feat/phase-9]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Validate manufacturers
        run: node scripts/validate-manufacturers.mjs

      - name: Run unit tests
        run: pnpm vitest run

      - name: Build (static export)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: "/wp-json/kw-pv-tools/v1"

      - name: Check export output
        run: |
          test -d out/solax/configurator || (echo "Missing solax/configurator" && exit 1)
          test -d out/solax/embed        || (echo "Missing solax/embed" && exit 1)
          test -f out/kw-pv-tools-manifest.json || (echo "Missing manifest" && exit 1)
          echo "Export output OK"
        working-directory: ./app
