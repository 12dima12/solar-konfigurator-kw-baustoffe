    <script>
        function openSidebar() {
            const sidebar = document.getElementById('customSidebar');
            const overlay = document.getElementById('sidebarOverlay');

            sidebar.classList.remove('hidden');
            setTimeout(() => {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
            }, 10);
        }

        function closeSidebar() {
            const sidebar = document.getElementById('customSidebar');
            const overlay = document.getElementById('sidebarOverlay');

            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('opacity-0', 'pointer-events-none');

            setTimeout(() => {
                sidebar.classList.add('hidden');
            }, 300);
        }

        document.getElementById('currentSetup')?.addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);

        function printCustomSidebar() {
            const sidebarContent = document.getElementById('customSidebarContent').innerHTML;
            const printWindow = window.open('', '_blank', 'width=800,height=600');
            printWindow.document.open();
            printWindow.document.write(`
            <html>
                <head>
                <title>Print Custom Sidebar</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 20px; }
                </style>
                </head>
                <body>
                ${sidebarContent}
                </body>
            </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
    </script>

<!-- JAVASCRIPT -->

<script>

function toggleDropdown() {
    const dropdown = document.getElementById('langDropdown');
    
    if (!dropdown) {
        console.error('Language dropdown element not found');
        return;
    }
    
    dropdown.classList.toggle('hidden');
    
    // Použití weak reference pro lepší garbage collection
    const closeHandler = function(e) {
        if (!dropdown.contains(e.target) && !e.target.closest('button[onclick="toggleDropdown()"]')) {
            dropdown.classList.add('hidden');
            document.removeEventListener('click', closeHandler);
        }
    };
    
    // Přidání event listeneru s mírným zpožděním
    setTimeout(() => {
        document.addEventListener('click', closeHandler);
    }, 10);
}

// Accessibility enhancement - keyboard support
document.addEventListener('DOMContentLoaded', function() {
    const dropdownButton = document.querySelector('button[onclick="toggleDropdown()"]');
    
    if (dropdownButton) {
        dropdownButton.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleDropdown();
            }
        });
    }
});
</script>
<script>
    let lastHeight = 0;
    let isInitialized = false;
    
    function sendHeight() {
        const height = document.body.scrollHeight;
        
        // Pošli výšku pouze pokud se změnila nebo je to první volání
        if (height !== lastHeight || !isInitialized) {
            lastHeight = height;
            isInitialized = true;
            console.log('Sending height to parent:', height);
            window.parent.postMessage({ height: height }, "*");
        }
    }
    
    // Pošli výšku po načtení
    window.addEventListener('load', sendHeight);
    
    // Debounce funkce pro resize
    let resizeTimeout;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(sendHeight, 250);
    });
    
    // Debounce funkce pro mutation observer
    let mutationTimeout;
    const observer = new MutationObserver(function() {
        clearTimeout(mutationTimeout);
        mutationTimeout = setTimeout(sendHeight, 100);
    });
    observer.observe(document.body, { 
        childList: true, 
        subtree: true, 
        attributes: true 
    });
    
    // Poslouchej zprávy od parent okna
    window.addEventListener('message', function(event) {
        if (event.data === 'getHeight') {
            sendHeight();
        }
    });
</script>
